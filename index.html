<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRE_VALIDADOR_SEFAZ — 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            padding: 40px 20px;
            color: #e8eaf6;
            overflow-x: hidden;
            position: relative;
            perspective: 1500px;
        }

        /* Animated 3D background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 15% 20%, rgba(102,126,234,0.35), transparent 45%),
                radial-gradient(circle at 85% 80%, rgba(118,75,162,0.35), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(56,189,248,0.15), transparent 60%);
            z-index: -2;
            animation: bgShift 20s ease-in-out infinite alternate;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(800px) rotateX(60deg) translateY(40%) scale(2);
            transform-origin: 50% 100%;
            z-index: -1;
            mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 60%, transparent 90%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 60%, transparent 90%);
            animation: gridScroll 12s linear infinite;
        }
        @keyframes bgShift {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }
        @keyframes gridScroll {
            from { background-position: 0 0; }
            to { background-position: 0 50px; }
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            transform-style: preserve-3d;
        }

        /* 3D Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            transform-style: preserve-3d;
            animation: floatHeader 6s ease-in-out infinite;
        }
        @keyframes floatHeader {
            0%, 100% { transform: translateZ(0) translateY(0); }
            50% { transform: translateZ(30px) translateY(-8px); }
        }
        .header h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #c4b5fd 50%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            margin-bottom: 12px;
            text-shadow: 0 10px 40px rgba(129,140,248,0.5);
            filter: drop-shadow(0 4px 20px rgba(102,126,234,0.4));
        }
        .header p {
            color: #a5b4fc;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Glassmorphism card with 3D depth */
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.04) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 36px;
            box-shadow:
                0 30px 80px rgba(0,0,0,0.5),
                0 10px 30px rgba(102,126,234,0.15),
                inset 0 1px 0 rgba(255,255,255,0.15),
                inset 0 -1px 0 rgba(0,0,0,0.2);
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 3D Upload area */
        .upload-area {
            position: relative;
            border: 2px dashed rgba(165,180,252,0.4);
            border-radius: 16px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            background: linear-gradient(135deg, rgba(102,126,234,0.08), rgba(118,75,162,0.08));
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d;
        }
        .upload-area:hover, .upload-area.dragover {
            transform: translateZ(20px) scale(1.02);
            border-color: #818cf8;
            background: linear-gradient(135deg, rgba(102,126,234,0.18), rgba(118,75,162,0.18));
            box-shadow:
                0 20px 60px rgba(102,126,234,0.4),
                inset 0 0 40px rgba(129,140,248,0.1);
        }
        .upload-area input[type="file"] { display: none; }
        .upload-icon {
            font-size: 56px;
            margin-bottom: 14px;
            display: inline-block;
            filter: drop-shadow(0 8px 20px rgba(129,140,248,0.5));
            animation: floatIcon 4s ease-in-out infinite;
            transform-style: preserve-3d;
        }
        @keyframes floatIcon {
            0%, 100% { transform: translateZ(0) translateY(0) rotateY(0); }
            25% { transform: translateZ(15px) translateY(-6px) rotateY(8deg); }
            75% { transform: translateZ(15px) translateY(-6px) rotateY(-8deg); }
        }
        .upload-text {
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 6px;
        }
        .upload-hint {
            color: #a5b4fc;
            font-size: 12px;
        }

        /* File list */
        .file-list {
            margin-bottom: 20px;
            max-height: 280px;
            overflow-y: auto;
            transform-style: preserve-3d;
        }
        .file-list:empty { display: none; }
        .file-list::-webkit-scrollbar { width: 6px; }
        .file-list::-webkit-scrollbar-thumb { background: rgba(129,140,248,0.4); border-radius: 3px; }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            border-left: 3px solid #818cf8;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #e8eaf6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transform-style: preserve-3d;
            transition: transform 0.2s;
            animation: slideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .file-item:hover {
            transform: translateZ(8px) translateX(4px);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px) translateZ(-30px); }
            to { opacity: 1; transform: translateX(0) translateZ(0); }
        }
        .file-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 70%;
        }
        .file-size { color: #94a3b8; font-size: 11px; margin-right: 10px; }
        .file-remove {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            padding: 4px 10px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .file-remove:hover {
            background: rgba(239,68,68,0.3);
            transform: scale(1.1) translateZ(5px);
        }

        /* 3D buttons */
        .actions { display: flex; gap: 12px; margin-bottom: 24px; transform-style: preserve-3d; }
        .button {
            flex: 1;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow:
                0 10px 30px rgba(99,102,241,0.4),
                inset 0 1px 0 rgba(255,255,255,0.25),
                inset 0 -2px 0 rgba(0,0,0,0.2);
            transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
            overflow: hidden;
        }
        .button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .button:hover:not(:disabled) {
            transform: translateZ(20px) translateY(-3px);
            box-shadow:
                0 20px 50px rgba(99,102,241,0.6),
                inset 0 1px 0 rgba(255,255,255,0.3);
        }
        .button:hover:not(:disabled)::before { opacity: 1; }
        .button:active:not(:disabled) {
            transform: translateZ(10px) translateY(-1px);
        }
        .button:disabled { opacity: 0.4; cursor: not-allowed; }
        .button-secondary {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            box-shadow:
                0 10px 30px rgba(0,0,0,0.2),
                inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
        }

        /* Loading */
        .loading { text-align: center; display: none; margin: 30px 0; transform-style: preserve-3d; }
        .loading.show { display: block; animation: pulse3d 1.5s ease-in-out infinite; }
        @keyframes pulse3d {
            0%, 100% { transform: translateZ(0); }
            50% { transform: translateZ(15px); }
        }
        .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 15px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #6366f1, #ec4899, #6366f1);
            animation: spin 1.2s linear infinite;
            position: relative;
            box-shadow: 0 10px 30px rgba(99,102,241,0.5);
        }
        .spinner::after {
            content: '';
            position: absolute;
            inset: 5px;
            background: #0a0e27;
            border-radius: 50%;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { color: #c4b5fd; font-size: 14px; font-weight: 500; }

        .error-box {
            color: #fca5a5;
            margin-top: 10px;
            padding: 12px 16px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            display: none;
        }
        .error-box.show { display: block; }

        /* Summary 3D cards */
        .summary {
            display: none;
            gap: 12px;
            margin-bottom: 24px;
            transform-style: preserve-3d;
        }
        .summary.show { display: grid; grid-template-columns: repeat(4, 1fr); }
        .summary-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px 12px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow:
                0 10px 30px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.1);
            transform-style: preserve-3d;
            transition: transform 0.3s;
            animation: cardIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }
        .summary-card:nth-child(1) { animation-delay: 0.05s; }
        .summary-card:nth-child(2) { animation-delay: 0.15s; }
        .summary-card:nth-child(3) { animation-delay: 0.25s; }
        .summary-card:nth-child(4) { animation-delay: 0.35s; }
        @keyframes cardIn {
            from { opacity: 0; transform: translateZ(-100px) rotateX(30deg); }
            to { opacity: 1; transform: translateZ(0) rotateX(0); }
        }
        .summary-card:hover {
            transform: translateZ(20px) rotateX(-5deg);
        }
        .summary-card .label {
            font-size: 10px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .summary-card .value {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .summary-card .value.green {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .summary-card .value.red {
            background: linear-gradient(135deg, #f87171, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Result cards with 3D tilt */
        .result-card {
            border-radius: 14px;
            margin-bottom: 14px;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            box-shadow:
                0 15px 40px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.1);
            transform-style: preserve-3d;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            animation: cardIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }
        .result-card:hover { transform: translateZ(15px) translateY(-3px); }

        .result-card-header {
            padding: 16px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
            transition: background 0.2s;
        }
        .result-card-header:hover { background: rgba(255,255,255,0.05); }
        .result-card-header.approved { border-left: 4px solid #22c55e; box-shadow: inset 4px 0 20px rgba(34,197,94,0.15); }
        .result-card-header.rejected { border-left: 4px solid #ef4444; box-shadow: inset 4px 0 20px rgba(239,68,68,0.15); }
        .result-card-header .title {
            font-weight: 600;
            font-size: 14px;
            color: #fff;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 60%;
        }
        .result-card-header .meta {
            font-size: 12px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-card-body {
            padding: 0 20px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), padding 0.4s;
            border-top: 1px solid transparent;
        }
        .result-card.expanded .result-card-body {
            max-height: 2000px;
            padding: 20px;
            border-top-color: rgba(255,255,255,0.1);
        }
        .chevron { transition: transform 0.3s; display: inline-block; color: #818cf8; }
        .result-card.expanded .chevron { transform: rotate(90deg); }

        .result-row {
            padding: 9px 14px;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            font-size: 12.5px;
            margin-bottom: 6px;
            color: #d1d5db;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .result-row strong { color: #fff; }
        .result-row code {
            background: rgba(129,140,248,0.2);
            color: #c4b5fd;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 11px;
        }
        .error-detail {
            border-left: 3px solid #ef4444;
            background: rgba(239,68,68,0.08) !important;
            color: #fecaca !important;
            box-shadow: 0 4px 15px rgba(239,68,68,0.15);
        }
        .error-detail strong { color: #fca5a5; }
        .warning-detail {
            border-left: 3px solid #f59e0b;
            background: rgba(245,158,11,0.08) !important;
            color: #fde68a !important;
            box-shadow: 0 4px 15px rgba(245,158,11,0.15);
        }
        .warning-detail strong { color: #fcd34d; }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-right: 10px;
            letter-spacing: 0.5px;
        }
        .status-approved {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 4px 12px rgba(34,197,94,0.5);
        }
        .status-rejected {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 4px 12px rgba(239,68,68,0.5);
        }
        .section-title {
            font-size: 13px;
            font-weight: 700;
            margin: 18px 0 10px;
            color: #c4b5fd;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 30px; }
            .glass-card { padding: 24px 20px; }
            .summary.show { grid-template-columns: repeat(2, 1fr); }
            .actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ PRE_VALIDADOR_SEFAZ</h1>
            <p>VALIDAÇÃO FISCAL ANTES DA SEFAZ • NF-E • CT-E • NFS-E</p>
        </div>

        <div class="glass-card">
            <div class="upload-area" id="uploadArea">
                <input type="file" id="fileInput" accept=".xml" multiple />
                <div class="upload-icon">📂</div>
                <div class="upload-text">Clique ou arraste seus XMLs</div>
                <div class="upload-hint">MÚLTIPLOS ARQUIVOS SUPORTADOS</div>
            </div>

            <div class="file-list" id="fileList"></div>

            <div class="actions">
                <button class="button" id="validateBtn" disabled>Validar</button>
                <button class="button button-secondary" id="resetBtn" style="display:none">← Voltar / Limpar</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p id="loadingText">Validando...</p>
            </div>

            <div class="error-box" id="errorBox"></div>

            <div class="summary" id="summary"></div>

            <div id="results"></div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const validateBtn = document.getElementById('validateBtn');
        const resetBtn = document.getElementById('resetBtn');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        const errorBox = document.getElementById('errorBox');
        const summary = document.getElementById('summary');
        const resultsDiv = document.getElementById('results');

        let selectedFiles = [];

        // 3D tilt effect on cursor
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.glass-card, .result-card');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                const dist = Math.sqrt(x*x + y*y);
                if (dist < 500) {
                    const tiltX = (y / rect.height) * -3;
                    const tiltY = (x / rect.width) * 3;
                    card.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
                }
            });
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            addFiles(Array.from(e.dataTransfer.files));
        });

        uploadArea.addEventListener('click', (e) => {
            if (e.target !== fileInput) fileInput.click();
        });
        fileInput.addEventListener('change', (e) => {
            addFiles(Array.from(e.target.files));
            fileInput.value = '';
        });

        function addFiles(files) {
            const xmlFiles = files.filter(f => f.name.toLowerCase().endsWith('.xml'));
            for (const f of xmlFiles) {
                if (!selectedFiles.find(s => s.name === f.name && s.size === f.size)) {
                    selectedFiles.push(f);
                }
            }
            renderFileList();
        }

        function removeFile(idx) {
            selectedFiles.splice(idx, 1);
            renderFileList();
        }
        window.removeFile = removeFile;

        function renderFileList() {
            fileList.innerHTML = '';
            selectedFiles.forEach((f, idx) => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.style.animationDelay = (idx * 0.05) + 's';
                div.innerHTML = `
                    <span class="file-name">📄 ${escapeHtml(f.name)}</span>
                    <span>
                        <span class="file-size">${(f.size / 1024).toFixed(1)} KB</span>
                        <button class="file-remove" onclick="removeFile(${idx})" title="Remover">×</button>
                    </span>
                `;
                fileList.appendChild(div);
            });
            validateBtn.disabled = selectedFiles.length === 0;
            validateBtn.textContent = selectedFiles.length > 1
                ? `Validar ${selectedFiles.length} XMLs`
                : 'Validar XML';
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        resetBtn.addEventListener('click', () => {
            selectedFiles = [];
            resultsDiv.innerHTML = '';
            summary.classList.remove('show');
            errorBox.classList.remove('show');
            renderFileList();
            resetBtn.style.display = 'none';
            uploadArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });

        validateBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            loading.classList.add('show');
            resultsDiv.innerHTML = '';
            summary.classList.remove('show');
            errorBox.classList.remove('show');
            validateBtn.disabled = true;

            const resultados = [];
            let aprovados = 0, rejeitados = 0, tempoTotal = 0;

            for (let i = 0; i < selectedFiles.length; i++) {
                const f = selectedFiles[i];
                loadingText.textContent = `Validando ${i+1}/${selectedFiles.length}: ${f.name}`;
                try {
                    const xml = await f.text();
                    const resp = await fetch('/api/validar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ xmlContent: xml })
                    });
                    const data = await resp.json();
                    resultados.push({ file: f, data });
                    if (data.status === 'aprovado') aprovados++; else rejeitados++;
                    tempoTotal += data.tempoProcessamento || 0;
                } catch (e) {
                    resultados.push({ file: f, error: e.message });
                    rejeitados++;
                }
            }

            loading.classList.remove('show');
            validateBtn.disabled = false;
            resetBtn.style.display = 'block';

            renderSummary(aprovados, rejeitados, tempoTotal);
            renderResults(resultados);
        });

        function renderSummary(ap, rej, ms) {
            summary.innerHTML = `
                <div class="summary-card"><div class="label">Total</div><div class="value">${ap+rej}</div></div>
                <div class="summary-card"><div class="label">Aprovados</div><div class="value green">${ap}</div></div>
                <div class="summary-card"><div class="label">Rejeitados</div><div class="value red">${rej}</div></div>
                <div class="summary-card"><div class="label">Tempo</div><div class="value">${ms}ms</div></div>
            `;
            summary.classList.add('show');
        }

        function renderResults(resultados) {
            resultsDiv.innerHTML = '';
            resultados.forEach((r, idx) => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.style.animationDelay = (idx * 0.08) + 's';

                if (r.error) {
                    card.innerHTML = `
                        <div class="result-card-header rejected" onclick="this.parentElement.classList.toggle('expanded')">
                            <span class="title">⚠️ ${escapeHtml(r.file.name)}</span>
                            <span class="meta">ERRO DE REQUISIÇÃO <span class="chevron">›</span></span>
                        </div>
                        <div class="result-card-body">
                            <div class="result-row error-detail">${escapeHtml(r.error)}</div>
                        </div>
                    `;
                    resultsDiv.appendChild(card);
                    return;
                }

                const d = r.data;
                const isApproved = d.status === 'aprovado';
                const badge = isApproved
                    ? '<span class="status-badge status-approved">✓ APROVADO</span>'
                    : '<span class="status-badge status-rejected">✗ REJEITADO</span>';
                const meta = `${d.totalErros||0} erro(s) • ${d.totalAvisos||0} aviso(s) • ${d.tempoProcessamento}ms`;

                const fmt = (v) => (v === null || v === undefined || v === '') ? '—' : escapeHtml(String(v));
                let body = `
                    <div class="result-row"><strong>Tipo:</strong> ${fmt(d.tipoDocumento)}</div>
                    <div class="result-row"><strong>Nº Documento:</strong> ${fmt(d.nfe)}</div>
                    <div class="result-row"><strong>Valor Total:</strong> ${d.valor !== null ? 'R$ ' + Number(d.valor).toFixed(2) : '—'}</div>
                    <div class="result-row"><strong>CFOP:</strong> ${fmt(d.cfop)} ${d.cfopDescricao ? '— ' + escapeHtml(d.cfopDescricao) : ''}</div>
                    <div class="result-row"><strong>Emissão:</strong> ${fmt(d.dataEmissao)}</div>
                    <div class="result-row"><strong>Emitente:</strong> ${fmt(d.cnpjFornecedor)}</div>
                    <div class="result-row"><strong>Destinatário:</strong> ${fmt(d.cnpjComprador)}</div>
                `;

                if (d.erros && d.erros.length > 0) {
                    body += '<div class="section-title">❌ Erros Críticos</div>';
                    d.erros.forEach((e, i) => {
                        body += `<div class="result-row error-detail">
                            <strong>${i+1}. [${e.tipo}]</strong> ${escapeHtml(e.descricao)}
                            ${e.campo ? `<br><small>Campo: <code>${escapeHtml(e.campo)}</code></small>` : ''}
                            ${e.valor ? `<br><small>Valor: <code>${escapeHtml(e.valor)}</code></small>` : ''}
                        </div>`;
                    });
                }
                if (d.avisos && d.avisos.length > 0) {
                    body += '<div class="section-title">⚠️ Avisos</div>';
                    d.avisos.forEach((a, i) => {
                        body += `<div class="result-row warning-detail">
                            <strong>${i+1}. [${a.tipo}]</strong> ${escapeHtml(a.descricao)}
                        </div>`;
                    });
                }
                if (d.tabelas) {
                    body += `<div class="section-title">Tabelas oficiais consultadas</div>
                        <div class="result-row" style="font-size:11px">
                          NCM: ${d.tabelas.ncm} vigentes • Municípios IBGE: ${d.tabelas.municipios} • CFOPs CONFAZ: ${d.tabelas.cfops}
                          ${d.tabelas.atualizacaoNcm ? '<br>' + escapeHtml(d.tabelas.atualizacaoNcm) : ''}
                        </div>`;
                }

                card.innerHTML = `
                    <div class="result-card-header ${isApproved?'approved':'rejected'}" onclick="this.parentElement.classList.toggle('expanded')">
                        <span class="title">${badge}${escapeHtml(r.file.name)}</span>
                        <span class="meta">${meta} <span class="chevron">›</span></span>
                    </div>
                    <div class="result-card-body">${body}</div>
                `;
                resultsDiv.appendChild(card);

                if (!isApproved) {
                    setTimeout(() => card.classList.add('expanded'), 300 + idx * 80);
                }
            });
        }
    </script>
</body>
</html>

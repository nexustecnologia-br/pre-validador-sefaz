<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRE_VALIDADOR_SEFAZ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 14px;
        }
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }
        .upload-area.dragover {
            border-color: #764ba2;
            background: #f0f2ff;
        }
        .upload-area input {
            display: none;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .upload-text {
            color: #333;
            font-size: 16px;
            margin-bottom: 5px;
        }
        .upload-hint {
            color: #999;
            font-size: 12px;
        }
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        .button:hover {
            transform: translateY(-2px);
        }
        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .result h3 {
            margin-bottom: 15px;
            font-size: 18px;
        }
        .result-item {
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.05);
            border-radius: 4px;
            font-size: 13px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .status-approved {
            background: #28a745;
            color: white;
        }
        .status-rejected {
            background: #dc3545;
            color: white;
        }
        .loading {
            text-align: center;
            display: none;
            margin: 20px 0;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-box {
            color: #dc3545;
            margin-top: 10px;
            padding: 10px;
            background: #fff5f5;
            border-radius: 4px;
            display: none;
        }
        .error-box.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 PRE_VALIDADOR_SEFAZ</h1>
            <p>Valide seu XML antes de enviar para SEFAZ</p>
        </div>

        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept=".xml" />
            <div class="upload-icon">📄</div>
            <div class="upload-text">Clique ou arraste seu XML aqui</div>
            <div class="upload-hint">Suporta: NF-e, CTe, NFSe</div>
        </div>

        <button class="button" id="validateBtn" disabled>Validar XML</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Validando...</p>
        </div>

        <div class="error-box" id="errorBox"></div>

        <div class="result" id="result"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const validateBtn = document.getElementById('validateBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const errorBox = document.getElementById('errorBox');

        let selectedFile = null;

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        // Click to upload
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            selectedFile = file;
            uploadArea.innerHTML = `
                <div class="upload-icon">✅</div>
                <div class="upload-text">${file.name}</div>
                <div class="upload-hint">${(file.size / 1024).toFixed(2)} KB</div>
            `;
            validateBtn.disabled = false;
        }

        validateBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            loading.style.display = 'block';
            result.classList.remove('show');
            errorBox.classList.remove('show');

            try {
                const xmlContent = await selectedFile.text();

                const response = await fetch('/api/validar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        xmlContent: xmlContent
                    })
                });

                if (!response.ok) {
                    throw new Error(`Erro: ${response.statusText}`);
                }

                const data = await response.json();

                // Mostrar resultado
                const isApproved = data.status === 'aprovado';
                const statusClass = isApproved ? 'success' : 'error';
                const statusBadgeClass = isApproved ? 'status-approved' : 'status-rejected';
                const statusText = isApproved ? '✅ APROVADO' : '❌ REJEITADO';

                let html = `
                    <span class="status-badge ${statusBadgeClass}">${statusText}</span>
                    <h3>Resultado da Validação</h3>
                    <div class="result-item"><strong>ID Validação:</strong> ${data.validacaoId}</div>
                    <div class="result-item"><strong>Tempo:</strong> ${data.tempoProcessamento}ms</div>
                    <div class="result-item"><strong>NF-e:</strong> ${data.nfe}</div>
                    <div class="result-item"><strong>Valor:</strong> R$ ${data.valor}</div>
                    <div class="result-item"><strong>CFOP:</strong> ${data.cfop}</div>
                `;

                if (data.erros && data.erros.length > 0) {
                    html += '<h3 style="margin-top: 20px;">Erros Encontrados:</h3>';
                    data.erros.forEach((erro, idx) => {
                        html += `
                            <div class="result-item">
                                <strong>${idx + 1}. ${erro.tipo}</strong><br/>
                                ${erro.descricao}<br/>
                                <em style="opacity: 0.7;">Severidade: ${erro.severidade}</em>
                            </div>
                        `;
                    });
                }

                result.innerHTML = html;
                result.className = `result show ${statusClass}`;

            } catch (error) {
                console.error('Erro:', error);
                errorBox.textContent = `❌ ${error.message}`;
                errorBox.classList.add('show');
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
